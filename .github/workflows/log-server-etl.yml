name: Server ETL Logging

# Serwer lh.pl (cron_run.php uruchamiany natywnym CRON-em) po przebiegu ETL wysyla
# repository_dispatch z payloadem {date, status, duration, summary, log}. Tutaj go
# logujemy do podsumowania runu, wysylamy mail ze statusem (Resend) i odbijamy
# prawdziwy status w UI Actions (czerwony przy bledzie).

on:
  repository_dispatch:
    types: [server_etl_report]

jobs:
  log-report:
    name: Log ETL Status
    runs-on: ubuntu-latest
    # payload do env (NIE wprost w shellu - wieloliniowy log/traceback lamie basha
    # i jest podatny na injection)
    env:
      P_DATE: ${{ github.event.client_payload.date }}
      P_STATUS: ${{ github.event.client_payload.status }}
      P_DURATION: ${{ github.event.client_payload.duration }}
      P_SUMMARY: ${{ github.event.client_payload.summary }}
      P_LOG: ${{ github.event.client_payload.log }}
    steps:
      - name: Generate job summary
        run: |
          {
            echo "### ETL Execution Summary"
            echo "- Date: ${P_DATE}"
            echo "- Status: ${P_STATUS}"
            echo "- Duration: ${P_DURATION} s"
            echo "- Summary: ${P_SUMMARY}"
            echo ""
            echo "#### Log tail"
            echo '```'
            printf '%s\n' "${P_LOG}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Email status (Resend)
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          jq -n \
            --arg from "${MAIL_FROM:-onboarding@resend.dev}" \
            --arg to "$MAIL_TO" \
            --arg subject "Zabka ETL (serwer): ${P_STATUS} (${P_DATE})" \
            --arg status "$P_STATUS" \
            --arg date "$P_DATE" \
            --arg dur "$P_DURATION" \
            --arg summary "$P_SUMMARY" \
            --arg run "$RUN_URL" \
            --arg log "$P_LOG" \
            '{from:$from, to:[$to], subject:$subject,
              text: ("Status:       " + $status
                + "\nData:         " + $date
                + "\nCzas:         " + $dur + " s"
                + "\nPodsumowanie: " + $summary
                + "\nRun:          " + $run
                + "\n\n--- log ETL (ogon) ---\n" + $log)}' \
          | curl -sS -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              --data @-

      - name: Reflect status in the run (red on failure)
        if: env.P_STATUS == 'failure'
        run: |
          echo "Serwer zglosil blad ETL - patrz mail / podsumowanie runu." >&2
          exit 1
