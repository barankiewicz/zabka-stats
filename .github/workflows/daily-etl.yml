name: daily-etl

# Codzienny ETL Zabki: loguje sie po SSH na serwer (gdzie stoi backend + DuckDB),
# odpala tam `python -m backend.daily_etl`, po czym wysyla mail ze statusem runu
# (przez Resend API) - przy KAZDYM przebiegu, sukces czy blad.
#
# Wymagane sekrety repo (Settings -> Secrets and variables -> Actions):
#   SSH_HOST            - host serwera (np. serwer441858.lh.pl)
#   SSH_USER            - uzytkownik SSH
#   SSH_KEY             - prywatny klucz SSH (caly, z naglowkami BEGIN/END)
#   SSH_PORT            - port SSH (opcjonalny; domyslnie 22)
#   SERVER_PROJECT_DIR  - sciezka do repo na serwerze (np. /home/uzytkownik/zabka-stats)
#   RESEND_API_KEY      - klucz API Resend
#   MAIL_TO             - adres docelowy (np. barankiewicz@protonmail.ch)
#   MAIL_FROM           - nadawca (opcjonalny; domyslnie onboarding@resend.dev do testow)

on:
  schedule:
    - cron: "0 3 * * *"   # codziennie 03:00 UTC (~05:00 w PL latem)
  workflow_dispatch: {}   # reczne uruchomienie (do testu)

concurrency:
  group: daily-etl
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - name: Run ETL on the server over SSH
        id: etl
        continue-on-error: true   # nie przerywaj - mail ma pojsc tak czy siak
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DIR: ${{ secrets.SERVER_PROJECT_DIR }}
        run: |
          set -o pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_etl && chmod 600 ~/.ssh/id_etl
          # na serwerze: aktualny kod + ETL (zasila backendowa baze DuckDB)
          ssh -i ~/.ssh/id_etl -o StrictHostKeyChecking=accept-new \
              -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" \
              "set -e; cd '$DIR'; git pull --ff-only; python -m backend.daily_etl" \
              2>&1 | tee etl.log

      - name: Email run status (Resend)
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: |
          STATUS="${{ steps.etl.outcome }}"   # success | failure
          SUBJECT="Zabka ETL: $STATUS ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          LOG="$(tail -c 6000 etl.log 2>/dev/null || echo 'brak logu')"
          # jeden, kompletny mail: wszystko co dalby GitHub + ogon logu ETL.
          # Tresc budowana w jq, zeby uniknac wieloliniowych stringow w YAML.
          jq -n \
            --arg from "${MAIL_FROM:-onboarding@resend.dev}" \
            --arg to "$MAIL_TO" \
            --arg subject "$SUBJECT" \
            --arg status "$STATUS" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg commit "$GITHUB_SHA" \
            --arg trigger "$GITHUB_EVENT_NAME" \
            --arg attempt "$GITHUB_RUN_ATTEMPT" \
            --arg run "$RUN_URL" \
            --arg log "$LOG" \
            '{from:$from, to:[$to], subject:$subject,
              text: ("Status:  " + $status
                + "\nRepo:    " + $repo
                + "\nBranch:  " + $branch
                + "\nCommit:  " + $commit
                + "\nTrigger: " + $trigger + " (proba " + $attempt + ")"
                + "\nRun:     " + $run
                + "\n\n--- log ETL (ogon) ---\n" + $log)}' \
          | curl -sS -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              --data @-

      - name: Reflect ETL status in the run (red on failure)
        if: steps.etl.outcome == 'failure'
        run: |
          echo "ETL na serwerze zwrocil blad - patrz mail / log runu." >&2
          exit 1
