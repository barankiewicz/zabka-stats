# Nginx config for zabkozbior.barankiewicz.dev
# Place at: /etc/nginx/sites-available/zabka
# Enable: ln -s /etc/nginx/sites-available/zabka /etc/nginx/sites-enabled/zabka
# Test:   nginx -t
# Reload: systemctl reload nginx
#
# Key additions vs a plain reverse-proxy:
#   - Microcache (2s) for static API endpoints - survives traffic spikes
#   - Long-lived Cache-Control on static assets (immutable for hashed JS/CSS,
#     a day for unhashed public/ files) - see the two asset locations below
#   - Frontend proxied through backend (www-data can't traverse /home/zabka/ 700)
#   - Gzip for API JSON responses
#   - Rate limiting to prevent abuse / bot amplification
#   - worker_connections tuned in nginx.conf (see below)
#
# NOTE ON DRIFT: this file is a reference copy - there is no automated step
# that deploys it to the VPS (deploy/deploy.sh only ships the app, not nginx
# config). A certbot --nginx run during the rejewska.pl -> barankiewicz.dev
# domain migration regenerated /etc/nginx/sites-available/zabka on the server
# from scratch, silently dropping the /assets/ Cache-Control block and these
# comments in the process (discovered 2026-07-01 while adding the static-asset
# caching below - every static file, including the hashed JS/CSS, was being
# served with zero Cache-Control). If you edit this file, copy it to the VPS
# by hand (scp / paste), run `nginx -t`, then `systemctl reload nginx` -
# editing only the live file and forgetting to update this copy is exactly how
# it drifted last time.
#
# Also add to /etc/nginx/nginx.conf -> events block:
#   worker_processes auto;      <- uses all CPU cores
#   events {
#       worker_connections 8192;
#       use epoll;
#       multi_accept on;
#   }
# And in http block:
#   keepalive_timeout 30;
#   keepalive_requests 10000;

# Microcache zone: 10 MB metadata, up to 1 GB on disk, 60 min inactive TTL.
# Cache lives at /var/cache/nginx/zabka - create dir if it does not exist:
#   sudo mkdir -p /var/cache/nginx/zabka
#   sudo chown www-data:www-data /var/cache/nginx/zabka
proxy_cache_path /var/cache/nginx/zabka
    levels=1:2
    keys_zone=zabka_cache:10m
    max_size=500m
    inactive=60m
    use_temp_path=off;

# Rate limiting zone: 10 MB state, 30 req/s per IP.
# Most human users hit well under this; bots and scrapers get 429.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Rate limiting zone for snapshot uploads: 10 MB state, 1 request per minute per IP.
limit_req_zone $binary_remote_addr zone=snapshot_limit:10m rate=1r/m;

server {
    listen 80;
    server_name zabkozbior.barankiewicz.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name zabkozbior.barankiewicz.dev;

    # Let's Encrypt managed by certbot - do not edit these two lines by hand.
    # NOTE: these paths assume `certbot --nginx -d zabkozbior.barankiewicz.dev`
    # has already been run on the VPS to provision a cert for this domain -
    # switching server_name alone does not create it.
    ssl_certificate     /etc/letsencrypt/live/zabkozbior.barankiewicz.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zabkozbior.barankiewicz.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip for API JSON. nginx (C) compresses here instead of the uvicorn
    # worker, freeing the single CPU from gzipping the big payloads (the ~3.6 MB
    # locations/map especially). gzip_proxied any is required to compress
    # responses from the proxied backend; the backend itself no longer
    # compresses (Litestar CompressionConfig was removed). JS/CSS also arrive
    # pre-compressed as .gz/.br - see the /assets/ location and
    # backend/main.py's serve_asset - so this gzip mainly covers API JSON.
    gzip on;
    gzip_types application/json text/plain text/css application/javascript text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_vary on;

    # Vite-hashed assets (main-AbC123.js, *.css, plus the pre-compressed .gz/.br
    # siblings the backend serves based on Accept-Encoding - see serve_asset in
    # backend/main.py). The content hash IS the cache key: a changed file gets
    # a new URL, so it's safe to tell browsers to cache the response forever
    # and skip revalidation entirely ("immutable"). ^~ makes this authoritative
    # over the extension-based location below (both could otherwise match a
    # hypothetical /assets/*.svg - there isn't one today, but this keeps it
    # unambiguous).
    location ^~ /assets/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # add_header does not inherit from the server block once a location
        # defines its own - repeat the security headers here or they silently
        # disappear on every response from this location.
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP - see the long comment on the /api/ location below for what this
        # allows and why. Same reminder applies: this file is NOT auto-deployed
        # (deploy/deploy.sh only ships the app), copy by hand and verify against
        # a live browser console before and after reloading nginx on the VPS.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'inline-speculation-rules'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Static files from frontend/public/ with no cache-busting in their URL
    # (favicon, OG image, logos, robots.txt, sitemap.xml). These can change
    # without a URL change, so "immutable" would be wrong - a day-long cache
    # with must-revalidate means repeat visits skip the download via a cheap
    # 304 instead of the previous behavior (zero Cache-Control - every request
    # re-fetched files that essentially never change).
    location ~* \.(?:svg|png|jpe?g|webp|ico|xml|txt)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP - see the long comment on the /api/ location below for what this
        # allows and why. Same reminder applies: this file is NOT auto-deployed
        # (deploy/deploy.sh only ships the app), copy by hand and verify against
        # a live browser console before and after reloading nginx on the VPS.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'inline-speculation-rules'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always;
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
    }

    # Frontend served by the Litestar backend (uvicorn StaticFiles).
    # nginx proxies / to the backend instead of serving files directly,
    # because /home/zabka/ is 700 so www-data cannot traverse it.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP - see the long comment on the /api/ location below for what this
        # allows and why. Same reminder applies: this file is NOT auto-deployed
        # (deploy/deploy.sh only ships the app), copy by hand and verify against
        # a live browser console before and after reloading nginx on the VPS.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'inline-speculation-rules'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always;
        # HTML must always revalidate so a new deploy's index.html (which points
        # at the new hashed assets above) is picked up immediately.
        add_header Cache-Control "no-cache" always;
    }

    # --- Live API endpoints: kept as an inert no-op ---
    # The /api/live/* backend routes (weather/stargazing/lightning) were
    # removed - they were never wired into the dashboard and were the worst
    # perf/stability liability on the box (blocking external calls on the
    # single worker). This location now matches nothing meaningful; left here
    # only so re-adding a live endpoint later doesn't need new nginx config.
    location ~* ^/api/live/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 15s;
        proxy_cache off;
    }

    # --- Snapshot upload: rate-limited, no cache (internal/automation use) ---
    location = /api/snapshot {
        limit_req zone=snapshot_limit burst=3 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;  # ETL upload can take a while
        client_max_body_size 50m;
        proxy_cache off;
    }

    # --- All other API endpoints: microcache 2s ---
    # With Redis already caching responses for 1 hour, this 2s nginx layer
    # only matters during the first burst (cache cold) or a sudden traffic
    # spike where many requests arrive before Redis warms up.
    # proxy_cache_lock means only 1 request goes to the backend when the
    # cache is empty; others wait for that response to be cached.
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;

        proxy_cache zabka_cache;
        proxy_cache_key "$scheme$host$request_uri";
        proxy_cache_valid 200 2s;
        proxy_cache_valid 404 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;          # thundering herd protection (lock_timeout defaults to 5s already)

        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP. What the site actually loads, and why each piece is there:
        #   script-src 'self'            - the bundled JS under /assets/, self-hosted.
        #     'unsafe-inline'             - faq.html and methodology.html each carry a
        #                                   real inline <script type="module"> (the
        #                                   i18n bootstrap) with no nonce/hash, so a
        #                                   bare 'self' would break both pages.
        #     'inline-speculation-rules'  - index.html has an inline
        #                                   <script type="speculationrules"> prerender
        #                                   hint; this keyword allows just that,
        #                                   without needing 'unsafe-inline' for it.
        #   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com
        #                                 - inline style="" attributes + <style> blocks
        #                                   used throughout the markup, plus the Google
        #                                   Fonts CSS.
        #   font-src https://fonts.gstatic.com - the actual font files Google Fonts CSS
        #                                   points at.
        #   img-src 'self' data:         - all images are self-hosted; data: covers any
        #                                   inline-encoded chart/canvas assets.
        #   connect-src 'self'           - all XHR/fetch is same-origin: /api/* and the
        #                                   GoatCounter beacon at /gc/count (both same
        #                                   host). MapLibre GL is self-hosted, tile-free
        #                                   vector - no external tile server to allow.
        #   object-src 'none'; base-uri 'self'; frame-ancestors 'self' - hardening with
        #                                   no functional cost (nothing on the page uses
        #                                   <object>/<embed>, changes <base>, or expects
        #                                   to be framed).
        # This file is NOT auto-deployed (deploy/deploy.sh only ships the app) - copy it
        # to the VPS by hand, `nginx -t`, `systemctl reload nginx`, and check the browser
        # console for CSP violations both before and after, since the inline-script
        # allowances above were derived by reading the current markup, not by testing
        # against a live CSP-enforcing response.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'inline-speculation-rules'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always;
        # Expose cache status in response header (useful for debugging)
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # --- Docs and health (no cache, low traffic) ---
    location ~ ^/(docs|redoc|openapi.json|health) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache off;
    }

    # --- GoatCounter analytics (self-hosted, /gc/ prefix per -base-path) ---
    location /gc/ {
        default_type application/javascript;
        types { }
        # Override GoatCounter MIME type for count.js
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
    }
}
