target-version = "py311"

[lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",   # line too long - not enforcing a hard column limit
    "B006",   # mutable default argument - intentional in several places
    "B008",   # function call in default argument - same
    "UP007",  # use X | Y instead of Optional[X] - Litestar annotations
]

[lint.isort]
known-first-party = ["backend"]
